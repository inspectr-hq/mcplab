id: check-weather
name: Check Weather
mcp_servers:
  - ref: weather-mcp
prompt: I'm planning a trip to Paris next week. What's the current weather like
  there, and can you give me a 5-day forecast? Based on the weather, what should
  I pack?
eval:
  tool_constraints:
    required_tools:
      - get_current_weather
      - get_forecast
    forbidden_tools:
      - get_weather_alerts
  response_assertions:
    - type: regex
      pattern: Paris
    - type: regex
      pattern: °C
    - type: regex
      pattern: pack
extract:
  - name: current_temperature
    from: final_text
    regex: (\d+)°C
  - name: forecast_days
    from: final_text
    regex: (\d)-Day Forecast|forecast.*?(\d) day
  - name: city_mentioned
    from: final_text
    regex: (Paris)

