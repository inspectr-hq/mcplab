id: batch-quality
name: RCA - Batch Line - Concentration Quality
mcp_servers:
  - ref: trendminer
prompt: "We have the Batch Line Batch reactor 1, which is producing different
  products. Can you help to review the quality of the different products. The
  quality is given by the max concentration, I noticed some low quality batches
  could you help me investigate across all products?\v\v"
snapshot_eval:
  enabled: true
eval:
  tool_constraints:
    required_tools:
      - navigate_asset_hierarchy
      - value_based_search
    forbidden_tools:
      - search_tags
  response_assertions:
    - type: regex
      pattern: ALPHA
    - type: regex
      pattern: BETA
    - type: regex
      pattern: concentration
    - type: regex
      pattern: max
    - type: regex
      pattern: TM5-BP2-CONC.1
    - type: regex
      pattern: batches
    - type: regex
      pattern: "2024"
extract:
  - name: alpha_max_concentration
    from: final_text
    regex: ALPHA[^\n]{0,80}(?:max(?:imum)?|highest)[^\n]{0,80}([\d]+(?:\.[\d]+)?)
  - name: beta_max_concentration
    from: final_text
    regex: BETA[^\n]{0,80}(?:max(?:imum)?|highest)[^\n]{0,80}([\d]+(?:\.[\d]+)?)
  - name: product_tag_used
    from: final_text
    regex: (TM5-BP2-PRODUCT\.1)
  - name: concentration_tag_used
    from: final_text
    regex: (TM5-BP2-CONC\.1)
  - name: higher_quality_product
    from: final_text
    regex: (?:ALPHA|BETA)[^\n]{0,60}(?:higher|better|greater)[^\n]{0,60}(?:concentration|quality)

